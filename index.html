<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video.js Screenshot Plugin Demo</title>
  <link href="https://vjs.zencdn.net/8.16.1/video-js.css" rel="stylesheet" />
  <link href="plugin/videojs-screenshot.css" rel="stylesheet" />
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; padding: 0; background: #0e0f12; color: #e8e8ea; }
    header { padding: 16px 24px; border-bottom: 1px solid #23242a; background: #121318; position: sticky; top: 0; z-index: 10; }
    header h1 { font-size: 18px; margin: 0; }
    main { padding: 24px; }
    .player-wrap { max-width: 960px; margin: 0 auto; }
  </style>
</head>
<body>
  <header>
    <h1>Video.js Screenshot Plugin</h1>
  </header>
  <main>
    <div class="player-wrap">
      <video
        id="demo-player"
        class="video-js vjs-default-skin vjs-big-play-centered"
        controls
        preload="auto"
        width="960"
        height="540"
        data-setup='{}'
      >
        <source src="https://vjs.zencdn.net/v/oceans.mp4" type="video/mp4" />
        <p class="vjs-no-js">
          To view this video please enable JavaScript, and consider upgrading to a web browser that
          <a href="https://videojs.com/html5-video-support/" target="_blank" rel="noopener noreferrer">supports HTML5 video</a>
        </p>
      </video>
    </div>
  </main>

  <script src="https://vjs.zencdn.net/8.16.1/video.min.js"></script>
  <script src="plugin/videojs-screenshot.js"></script>
  <script>
    const player = videojs('demo-player', {
      fluid: false,
    });

    player.ready(function () {
      player.screenshot({
        // Example initial options (all optional)
        buttons: { capture: true, controls: true, gallery: true },
        hotkeys: {
          enabled: true,
          mapping: {
            capture: 'KeyC',
            toggleControlsPanel: 'KeyM',
            toggleGallery: 'KeyG',
            toggleAutoCapture: 'KeyI',
            exportTimelapse: 'KeyE'
          }
        },
        storage: { type: 'browser' },
        filters: { preset: 'none', custom: '' },
        watermark: { enabled: false, text: '© Demo', position: 'bottom-right', color: '#ffffff', opacity: 0.75, size: 18 },
        capture: { format: 'image/png', quality: 0.92, includeTimestamp: true },
        gallery: { layout: 'grid', thumbSize: 160 },
        localization: {},
      });
    });
  </script>
</body>
</html>
